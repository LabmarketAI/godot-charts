name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  addon-sync-check:
    name: Addon Sync Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout addon
        uses: actions/checkout@v4
        with:
          path: src

      - name: Verify addons are synchronized
        run: |
          cd src
          bash scripts/check-demo-addon-sync.sh

  unit-tests:
    name: Unit Tests (.NET)
    runs-on: ubuntu-latest
    needs: addon-sync-check

    steps:
      - name: Checkout addon
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore test project
        run: dotnet restore tests/GodotChartsTests.csproj

      - name: Run NUnit tests
        run: dotnet test tests/GodotChartsTests.csproj --configuration Release --verbosity minimal
